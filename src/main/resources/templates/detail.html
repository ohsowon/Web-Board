<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title th:text="${post.title}">게시글 상세</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
</head>
<body>
<div class="container mt-5" style="max-width:800px;">
    <h2 th:text="${post.title}" class="mb-2"></h2>
    <div class="text-muted small mb-3">
        <span>작성자: <strong th:text="${post.author}"></strong></span>
        &nbsp;&nbsp;|&nbsp;&nbsp;
        <span>조회수: <strong th:text="${post.viewCount}"></strong></span>
        &nbsp;&nbsp;|&nbsp;&nbsp;
        <span th:text="${post.formattedCreatedAt}"></span>
    </div>
    <hr>
    <div class="py-3" style="white-space:pre-wrap; min-height:200px;" th:text="${post.content}"></div>
    <hr>
    <div class="d-flex gap-2">
        <a th:href="@{/posts/{id}/edit(id=${post.id})}" class="btn btn-warning">수정</a>
        <form th:action="@{/posts/{id}/delete(id=${post.id})}" method="post">
            <button type="submit" class="btn btn-danger"
                    onclick="return confirm('정말 삭제하시겠습니까?')">삭제</button>
        </form>
        <a href="/posts" class="btn btn-secondary">목록으로</a>
    </div>
</div>
</body>
</html>
