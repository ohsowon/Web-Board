<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>글쓰기</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
</head>
<body>
<div class="container mt-5" style="max-width:800px;">
    <h2 class="mb-3">글쓰기</h2>
    <hr>
    <form action="/posts/new" method="post">
        <div class="mb-3">
            <label class="form-label fw-bold">제목</label>
            <input type="text" name="title" class="form-control" placeholder="제목을 입력하세요" required>
        </div>
        <div class="mb-3">
            <label class="form-label fw-bold">작성자</label>
            <input type="text" name="author" class="form-control" placeholder="작성자를 입력하세요" required>
        </div>
        <div class="mb-3">
            <label class="form-label fw-bold">내용</label>
            <textarea name="content" class="form-control" rows="12" placeholder="내용을 입력하세요" required></textarea>
        </div>
        <div class="d-flex gap-2">
            <button type="submit" class="btn btn-primary">등록</button>
            <a href="/posts" class="btn btn-secondary">취소</a>
        </div>
    </form>
</div>
</body>
</html>
