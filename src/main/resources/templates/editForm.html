<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>글 수정</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
</head>
<body>
<div class="container mt-5" style="max-width:800px;">
    <h2 class="mb-3">글 수정</h2>
    <hr>
    <form th:action="@{/posts/{id}/edit(id=${post.id})}" method="post">
        <div class="mb-3">
            <label class="form-label fw-bold">제목</label>
            <input type="text" name="title" class="form-control" th:value="${post.title}" required>
        </div>
        <div class="mb-3">
            <label class="form-label fw-bold">작성자</label>
            <input type="text" name="author" class="form-control" th:value="${post.author}" required>
        </div>
        <div class="mb-3">
            <label class="form-label fw-bold">내용</label>
            <textarea name="content" class="form-control" rows="12" required th:text="${post.content}"></textarea>
        </div>
        <div class="d-flex gap-2">
            <button type="submit" class="btn btn-primary">수정 완료</button>
            <a th:href="@{/posts/{id}(id=${post.id})}" class="btn btn-secondary">취소</a>
        </div>
    </form>
</div>
</body>
</html>
