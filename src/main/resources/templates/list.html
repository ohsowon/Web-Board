<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>게시판</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
</head>
<body>
<div class="container mt-5">
    <h2 class="mb-3">게시판</h2>
    <hr>
    <a href="/posts/new" class="btn btn-primary mb-3">글쓰기</a>
    <table class="table table-hover align-middle">
        <thead class="table-dark">
        <tr>
            <th style="width:80px;">번호</th>
            <th>제목</th>
            <th style="width:120px;">작성자</th>
            <th style="width:80px;">조회수</th>
            <th style="width:160px;">작성일</th>
        </tr>
        </thead>
        <tbody>
        <tr th:each="post : ${posts}">
            <td th:text="${post.id}"></td>
            <td>
                <a th:href="@{/posts/{id}(id=${post.id})}"
                   th:text="${post.title}"
                   class="text-decoration-none fw-semibold"></a>
            </td>
            <td th:text="${post.author}"></td>
            <td th:text="${post.viewCount}"></td>
            <td th:text="${post.formattedCreatedAt}"></td>
        </tr>
        </tbody>
    </table>
    <p th:if="${#lists.isEmpty(posts)}" class="text-center text-muted mt-4">
        아직 게시글이 없습니다. 첫 번째 글을 작성해보세요!
    </p>
</div>
</body>
</html>
